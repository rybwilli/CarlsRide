# This "input" configures a global authorization rule to enable public access to
# all models in this schema. Learn more about authorization rules here: https://docs.amplify.aws/cli/graphql/authorization-rules
input AMPLIFY { globalAuthRule: AuthRule = { allow: public } } # FOR TESTING ONLY!

type Event @model {
  id: ID!
  name: String!
  date: AWSDate!
  gatheringTime: String!
  location: String!
  description: String
  rides: [Ride] @hasMany(indexName: "byEvent", fields: ["id"])
  foodItems: [FoodItem] @hasMany(indexName: "byEvent", fields: ["id"])
}

type Ride @model {
  id: ID!
  eventId: ID! @index(name: "byEvent")
  name: String!
  startLocation: String!
  departureTime: String!
  distanceMiles: Float!
  difficulty: String!
  bikeType: String!
  description: String!
  leader: String!
  leaderContact: String
  notes: String
  routeLinks: [RouteLink]
  riders: [RiderInfo]
}

type FoodItem @model {
  id: ID!
  eventId: ID! @index(name: "byEvent")
  category: String!
  item: String!
  notes: String
  servings: Int
  broughtBy: String!
}

type SaleItem @model {
  id: ID!
  name: String!
  description: String!
  price: Float!
  category: String!
  status: String!
  seller: String!
  images: [String]
  activity: String
  condition: String
}

type RouteLink {
  linkType: String!
  url: String!
}

type RiderInfo {
  name: String!
  email: String
  additionalGuests: Int
}
